<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Untitled post</title>
  <meta name="description" content="">
  <style>
    :root {
      --color-bg: #F7F7F5;
      --color-surface: #FFFFFF;
      --color-text: #1F2933;
      --color-muted: #52606D;
      --color-accent: #0F766E;
      --color-accent-soft: #D9F3EF;
      --color-border: #D9E2EC;
      --font-display: "Georgia", "Times New Roman", serif;
      --font-body: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.25rem 4rem;
      background: var(--color-surface);
    }
    main > * + * { margin-top: 1.1rem; }
    h1, h2, h3, h4 {
      font-family: var(--font-display);
      color: var(--color-text);
      line-height: 1.25;
      margin-top: 2.2rem;
      margin-bottom: 0.6rem;
    }
    h1 { font-size: 2.1rem; margin-top: 0; }
    h2 { font-size: 1.55rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 0 0 1rem; }
    a { color: var(--color-accent); }
    a:hover { text-decoration: underline; }
    blockquote {
      margin: 1.2rem 0;
      padding: 0.8rem 1.2rem;
      border-left: 3px solid var(--color-accent);
      background: var(--color-accent-soft);
      color: var(--color-text);
    }
    code, pre {
      font-family: var(--font-mono);
      font-size: 0.92em;
    }
    pre {
      background: #0F172A;
      color: #E2E8F0;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
    }
    code:not(pre code) {
      background: var(--color-accent-soft);
      padding: 0.05rem 0.3rem;
      border-radius: 3px;
    }
    figure {
      margin: 1.6rem 0;
    }
    figcaption {
      color: var(--color-muted);
      font-size: 0.92em;
      margin-top: 0.4rem;
    }
    img, svg, canvas {
      max-width: 100%;
      height: auto;
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2rem 0;
    }
    th, td {
      text-align: left;
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--color-border);
    }
    th { background: var(--color-accent-soft); }
  </style>
</head>
<body>
  <main data-content></main>
</body>
</html>
