<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Untitled post</title>
  <meta name="description" content="">
  <style>
    :root {
      --color-brand-blue: #2746DA;
      --color-brand-yellow: #F8DB31;
      --color-brand-navy: #012970;
      --color-brand-orange: #F7901E;
      --color-brand-light-orange: #F1BC0B;
      --color-brand-gray: #EBEBEB;
      --color-brand-white: #FFFFFF;
      --font-display: "Playfair Display", Georgia, serif;
      --font-heading: "Proxima Nova", "Avenir Next", "Trebuchet MS", sans-serif;
      --font-body: "Proxima Nova", Arial, Calibri, sans-serif;
      --font-accent: "Proxima Nova", Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--color-brand-white);
      color: var(--color-brand-navy);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 3.5rem 1.25rem 5rem;
    }
    main > * + * { margin-top: 1.1rem; }
    h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      line-height: 1.18;
      color: var(--color-brand-navy);
      margin: 0 0 1.2rem;
    }
    h2 {
      font-family: var(--font-heading);
      font-size: 0.92rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-brand-navy);
      margin: 2.4rem 0 0.6rem;
    }
    h3 {
      font-family: var(--font-heading);
      font-size: 1.18rem;
      font-weight: 700;
      color: var(--color-brand-navy);
      margin: 1.6rem 0 0.5rem;
    }
    p { margin: 0 0 1rem; }
    a { color: var(--color-brand-blue); }
    a:hover { text-decoration: underline; }
    blockquote {
      margin: 1.6rem 0;
      padding: 1.2rem 1.4rem;
      background: var(--color-brand-yellow);
      color: var(--color-brand-navy);
      font-family: var(--font-accent);
      font-weight: 600;
      border: 0;
    }
    code, pre {
      font-family: "SFMono-Regular", "SF Mono", Consolas, monospace;
      font-size: 0.92em;
    }
    pre {
      background: var(--color-brand-navy);
      color: var(--color-brand-white);
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
    }
    code:not(pre code) {
      background: var(--color-brand-gray);
      padding: 0.05rem 0.3rem;
      border-radius: 3px;
    }
    figure { margin: 1.8rem 0; }
    figcaption {
      color: var(--color-brand-navy);
      opacity: 0.7;
      font-style: italic;
      font-size: 0.9em;
      margin-top: 0.4rem;
    }
    img, svg, canvas {
      max-width: 100%;
      height: auto;
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.4rem 0;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--color-brand-gray);
    }
    th { background: var(--color-brand-blue); color: var(--color-brand-white); }
  </style>
</head>
<body>
  <main data-content></main>
</body>
</html>
